<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome template icon for macOS tray (44x44 = 22pt @2x) -->
  <!-- Card 3 (back) -->
  <rect x="10" y="27" width="24" height="5" rx="1.5" fill="black" opacity="0.45"/>
  <!-- Card 2 (middle) -->
  <rect x="7" y="21" width="30" height="6" rx="1.5" fill="black" opacity="0.65"/>
  <!-- Card 1 (front, active) -->
  <rect x="4" y="14" width="36" height="7" rx="2" fill="black"/>
  <!-- Active dot on card 1 -->
  <circle cx="9" cy="17.5" r="1.5" fill="white"/>
  <!-- Text lines on card 1 -->
  <rect x="13" y="16" width="14" height="2" rx="1" fill="white" opacity="0.9"/>
  <rect x="29" y="16" width="7" height="2" rx="1" fill="white" opacity="0.5"/>
</svg>
